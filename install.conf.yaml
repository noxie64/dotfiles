- defaults:
    link:
      relink: true

- link:
    ~/.config/nvim: config/nvim/
    ~/.config/hypr: config/hypr/
    ~/.config/waybar: config/waybar/
    ~/.config/rofi: config/rofi/
    ~/.config/kitty: config/kitty
    config/kitty/kitty.conf: config/kitty/conf/default/kitty.conf
    ~/.tmux.conf: config/tmux/conf/default/tmux.conf
    ~/.zshrc: config/.zshrc
    ~/.config/bspwm/: config/bspwm/
    ~/.config/sxhkd/: config/sxhkd/
    ~/.config/polybar/: config/polybar/
    ~/.config/picom/: config/picom/
    ~/.config/herbstluftwm/: config/herbstluftwm/
    ~/.config/wired/: config/wired/
    ~/.config/yazi/theme.toml: config/yazi/theme.toml
    ~/.config/yazi/yazi.toml: config/yazi/yazi.toml
    ~/.config/yazi/keymap.toml: config/yazi/keymap.toml
    ~/.config/tmux/_general.conf: config/tmux/_general.conf
    ~/.config/tmux/conf: config/tmux/conf
